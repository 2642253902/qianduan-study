<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>博客前台</title>
  </head>

  <body>
    <div class="blog">
      <div class="nav">
        <div class="container">
          <div class="left">
            <div>hello world</div>
            <div>HELLO WORLD</div>
          </div>
          <div class="center">
            <a href="">
              <a href="">首页</a>
              <a href="">搜索</a>
              <a href="">聊天室</a>
            </a>
          </div>
          <div class="right">
            <a href="">登录</a>
          </div>
        </div>
      </div>
      <div class="banner">
        <img
          src="https://tse4-mm.cn.bing.net/th/id/OIP-C.FkoE1cdZ4lHFAAQKChRAzAHaEK?w=283&h=180&c=7&r=0&o=7&pid=1.7&rm=3"
          alt=""
        />
        <div class="slogan">
          <div>hello world的个人博客九代</div>
          <div>我的九代博客</div>
        </div>
      </div>
      <main>
        <div class="container">
          <div class="left">
            <div class="card news">
              <div class="head">
                <div class="title">今日热搜</div>
              </div>
              <div class="body"></div>
            </div>
            <div class="card article">
              <div class="head">
                <div class="title">文章列表</div>
              </div>
              <div class="body"></div>
            </div>
          </div>
          <div class="right">
            <div class="card tags">
              <div class="head">
                <div class="title">标签云</div>
              </div>
              <div class="body"></div>
            </div>
            <div class="card user_info">
              <div class="head">
                <div class="title">个人信息</div>
              </div>
              <div class="body"></div>
            </div>
          </div>
        </div>
      </main>

      <div class="footer">Copyright © 2024 hello world</div>
    </div>
  </body>
  <style>
    body {
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    a {
      color: #333;
      text-decoration: none;
    }

    /* .blog {
    } */
    .blog .nav {
      width: 100%;
      height: 60px;
      background-color: rgb(255, 255, 255, 0.8);
      /* 使用flex布局使导航栏内容水平排列，并垂直居中 */
      position: fixed;
      /* 固定导航栏在页面顶部，确保它始终可见 */
      top: 0;
      display: flex;
      justify-content: center;
      /* 使用z-index: 100将导航栏的层级提高，确保它在其他内容之上显示，避免被其他元素遮挡 */
      z-index: 100;
    }
    .blog .nav .container {
      align-items: center;
    }
    .blog .nav .left {
      width: 10%;
    }

    .blog .nav .left div:nth-child(1) {
      font-size: 18px;
    }
    .blog .nav .left div:nth-child(2) {
      font-size: 14px;
    }

    .blog .nav .center {
      width: 70%;
    }
    .blog .nav .center a {
      margin-right: 20px;
    }
    .blog .nav .right {
      width: 20%;
      text-align: right;
    }

    .blog .banner {
      height: 600px;
      /* 使用相对定位，使slogan和abs能够相对于banner进行绝对定位 */
      position: relative;
    }
    .blog .banner img {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }
    .blog .banner .slogan {
      /* 使用绝对定位，使slogan覆盖在图片上，并且位于banner的中心位置 */
      position: absolute;
      left: 50%;
      top: 50%;
      /* 使用transform将slogan的中心点移动到left和top指定的位置，使其真正居中显示 */
      transform: translate(-50%, -50%);
    }

    .blog .banner .slogan div {
      color: white;
      text-align: center;
    }
    .blog .banner .slogan div:nth-last-child(1) {
      block-size: 26px;
    }
    .blog .banner .slogan div:nth-last-child(2) {
      block-size: 18px;
      margin-top: 10px;
    }
    .container {
      width: 1200px;
      display: flex;
    }

    .blog main {
      background-color: #f0eeee;
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }

    .blog main .container > .left {
      width: calc(100% - 300px - 20px);
      margin-right: 20px;
    }

    .blog main .container > .right {
      width: 300px;
    }

    .blog main .news {
      margin-bottom: 20px;
    }

    .blog main .tags {
      margin-bottom: 20px;
    }

    .card {
      background-color: white;
      border-radius: 5px;
    }

    .blog .footer {
      height: 50px;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card .head {
      height: 20px 20px 10px 20px;
      border-bottom: 1px solid #f0eeee;
    }

    .card .head .title {
      margin-left: 18px;
      font-size: 16px;
      font-weight: 600;
    }

    .card .body {
      padding: 10px 20px 20px 20px;
    }
  </style>
</html>
