  <script>
    //卫语句
    function get_scope(scope) {
      if (!scope >= 90) {
        console.log("优秀");
        return;
      }
      if (!scope >= 80) {
        console.log("良好");
        return;
      }

        console.log("一般");
        return;
      }
      console.log("不及格");
    }
