<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据类型-string</title>
  </head>
  <body></body>
  <script>
    const s1 = "hello world";
    console.log(s1, typeof s1);
    const s2 = String(123);
    console.log(s2, typeof s2);

    console.log(s2[0], typeof s2[0]);
    console.log(s2[1], typeof s2[1]);

    console.log(s2.indexOf("2"), typeof s2.indexOf("2"));
    console.log(s2.indexOf("q"), typeof s2.indexOf("q"));
    console.log(s2.indexOf("23"), typeof s2.indexOf("23"));

    const s3 = "hello,world,hello,js";

    const s4 = s3.split(",");
    console.log(s4, typeof s4);
    console.log(s4[0], typeof s4[0]);

    const s5 = s3.slice(0, 5);
    console.log(s5, typeof s5);

    const s6 = s3.includes("world");
    console.log(s6, typeof s6);
    const s7 = s3.indexOf("world") !== -1;
    console.log(s7, typeof s7);

    const s8 = "    我的名字叫张三    ";
    console.log(s8);
    console.log(s8.trim());
  </script>
</html>
