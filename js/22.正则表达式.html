<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正则表达式</title>
  </head>
  <body></body>
  <script>
    const re1 = /1\d{10}/;
    const re2 = /1\d{10}/g;
    const re3 = new RegExp("1\\d{10}", "g");
    const s = "我的手机号是: 12345678901, 他的手机号是: 19876543210";
    console.log(s.search(re1));
    console.log(s.match(re1));
    console.log(s.match(re2));

    console.log("大傻春，你要干什么！，你是大傻叉么？".replace("傻", "* ")); // replace方法只会替换第一个匹配到的字符串，如果要替换所有的字符串，需要使用正则表达式，并且加上g修饰符
    console.log("大傻春，你要干什么！，你是大傻叉么？".replaceAll("傻", "* ")); // replaceAll方法会替换所有的匹配到的字符串，不需要使用正则表达式，也不需要加上g修饰符

    console.log(
      "大傻春，你要干什么！，你是大傻叉么？".replace(/[傻叉]/g, "* "),
    );

    //分组替换
    const str = "my phone is 12345678901, my email is example@qq.com";
    //我的手机号是 我的邮箱是
    const re4 = /^.*?(1\d{10}).*?([\w-]*?@\w+\.\w+)$/;
    const newStr = str.replace(re4, "我的手机号是 $1，我的邮箱是 $2");
    console.log(newStr);

    const newStr1 = str.replace(re4, function (data, g1, g2) {
      // 对分组中的内容进行处理
      const tel = Number(g1) + 1; // 对手机号进行加1操作

      return `我的手机号是 ${tel.toString()}，我的邮箱是 ${g2}`;
    });
    console.log(newStr1);

    console.log(/abc/.test("abcd")); // true
    console.log(/abc/.test("abd")); // false

    const res = re4.exec(str);
    console.log(res[1]); // 手机号，获取第一个

    const re5 = /^.*?(?<phone>1\d{10}).*?(?<email>[\w-]*?@\w+\.\w+)$/;
    console.log(re5.exec(str)); // 手机号，获取第一个
    const res1 = re5.exec(str);
    console.log(res1.groups.phone); // 手机号，获取第一个
    console.log(res1.groups.email); // 邮箱，获取第二个
  </script>
</html>
