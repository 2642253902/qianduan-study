<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>变量声明</title>
  </head>
  <body></body>
  <script>
    const a = 123;
    console.log(a, typeof a);

    const b = Number(123);
    console.log(b, typeof b);

    const a2 = 0b110;
    console.log(a2, typeof a2);

    const a3 = 0o11;
    console.log(a3, typeof a3);

    const a4 = 0x11;
    console.log(a4, typeof a4);

    const a5 = 3.1415926;
    console.log(a5.toFixed(2), typeof a5);

    console.log(Number.parseInt(a5), typeof Number.parseInt(a5));
    console.log(Number.parseInt("5"), typeof Number.parseInt("5"));
    console.log(Number.parseInt("5.2646"), typeof Number.parseInt("5.2646"));

    console.log(Number.isInteger(1), typeof Number.isInteger(1));
    console.log(Number.isInteger(1.12), typeof Number.isInteger(1.12));
    console.log(Number.isInteger("1.12"), typeof Number.isInteger("1.12"));
    console.log(Number.isInteger("1"), typeof Number.isInteger("1"));
    console.log(Number.isInteger(-3), typeof Number.isInteger(-3));

    console.log(Math.round(3.5)); //四舍五入4
    console.log(Math.round(3.4)); //四舍五入3

    console.log(Math.ceil(1.00000001)); //向上取整2
    console.log(Math.ceil(1.9)); //向上取整2

    console.log(Math.floor(1.00000001)); //向下取整1
    console.log(Math.floor(1.9)); //向下取整1
  </script>
</html>
