<html lang="en">

  <body style="height: 200vh;">

  <script>
    console.log("视口", window.innerWidth, window.innerHeight);
    console.log("窗口", window.outerWidth, window.outerHeight);

    window.scrollTo(); // 滚动到页面顶部
