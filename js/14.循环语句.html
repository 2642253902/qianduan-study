<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>循环语句</title>
  </head>
  <body></body>
  <script>
    const obj = {
      name: "张三",
      age: 20,
    };

    for (const key in obj) {
      console.log(key, obj[key]);
    }

    const arr = ["a", "b", "c"];
    for (const element of arr) {
      console.log(element);
    }
  </script>
</html>
