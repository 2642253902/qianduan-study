<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组方法</title>
  </head>
  <body></body>
  <script>
    const a1 = ["hello", "world", "javascript"];

    a1.push("java");
    const l = a1.push("python", "c++");
    console.log(a1);
    console.log(l);

    const a2 = ["hello", "world", "javascript"];
    const item = a2.pop();
    console.log(item);
    console.log(a2);

    const a3 = ["hello", "world", "javascript"];
    const fi = a3.shift();
    console.log(fi);
    console.log(a3);

    const a4 = ["hello", "world", "javascript"];
    const l1 = a4.unshift("java");
    console.log(l1);
    console.log(a4);

    const a5 = ["hello", "world", "javascript"];
    const s = a5.join("-");
    console.log(s);
    console.log(a5.join());
    console.log(a5.join("|"));

    const a6 = [4, 8, 54, 10, 55, 8];
    const a7 = a6.sort();
    console.log(a6, a7);
    const a8 = a6.reverse();
    console.log(a8, a6);

    a6.sort((a, b) => {
      return b - a;
    });
    console.log(a6);

    const a9 = ["hello", "world", "javascript"];
    const a10 = a9.splice(1, 1);
    console.log(a9);
    console.log(a10);

    

  </script>
</html>
