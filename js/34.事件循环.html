<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件循环</title>
</head>

<body>

</body>
<script>

  console.log('1'); 
 
setTimeout(function() { 
    console.log('2'); 
    Promise.resolve().then(function() { 
        console.log('3'); 
    }); 
}, 0); 
 
Promise.resolve().then(function() { 
    console.log('4'); 
}); 
console.log('5'); 

  // 输出顺序：1 5 4 2 3

</script>

</html>
